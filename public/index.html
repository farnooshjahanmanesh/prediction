<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Readmission Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Hospital Readmission Predictor</h1>
    <p class="subtitle">
      Enter patient medical values to predict 30-day readmission risk
    </p>

    <form id="predictForm">
      <div class="grid">
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" step="any" id="age" name="age" required />
        </div>

        <div class="form-group">
          <label for="length_of_stay_days">Length of Stay (days)</label>
          <input type="number" step="any" id="length_of_stay_days" name="length_of_stay_days" required />
        </div>

        <div class="form-group">
          <label for="num_previous_admissions">Previous Admissions</label>
          <input type="number" step="any" id="num_previous_admissions" name="num_previous_admissions" required />
        </div>

        <div class="form-group">
          <label for="num_medications">Number of Medications</label>
          <input type="number" step="any" id="num_medications" name="num_medications" required />
        </div>

        <div class="form-group">
          <label for="hba1c">HbA1c</label>
          <input type="number" step="any" id="hba1c" name="hba1c" required />
        </div>

        <div class="form-group">
          <label for="blood_glucose_mg_dl">Blood Glucose (mg/dL)</label>
          <input type="number" step="any" id="blood_glucose_mg_dl" name="blood_glucose_mg_dl" required />
        </div>

        <div class="form-group">
          <label for="systolic_bp_mmhg">Systolic BP (mmHg)</label>
          <input type="number" step="any" id="systolic_bp_mmhg" name="systolic_bp_mmhg" required />
        </div>

        <div class="form-group">
          <label for="creatinine_mg_dl">Creatinine (mg/dL)</label>
          <input type="number" step="any" id="creatinine_mg_dl" name="creatinine_mg_dl" required />
        </div>

        <div class="form-group">
          <label for="haemoglobin_g_dl">Haemoglobin (g/dL)</label>
          <input type="number" step="any" id="haemoglobin_g_dl" name="haemoglobin_g_dl" required />
        </div>

        <div class="form-group">
          <label for="total_charges_inr">Total Charges (INR)</label>
          <input type="number" step="any" id="total_charges_inr" name="total_charges_inr" required />
        </div>
      </div>

      <button type="submit">Predict Risk</button>
    </form>

    <div id="result" class="result hidden">
      <h2>Prediction Result</h2>
      <p><strong>Prediction:</strong> <span id="prediction"></span></p>
      <p><strong>Risk Level:</strong> <span id="risk"></span></p>
      <p><strong>Probability:</strong> <span id="probability"></span></p>
    </div>
  </div>

  <script>
    const form = document.getElementById("predictForm");
    const resultBox = document.getElementById("result");
    const predictionEl = document.getElementById("prediction");
    const riskEl = document.getElementById("risk");
    const probabilityEl = document.getElementById("probability");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.error || "Prediction failed");
          return;
        }

        predictionEl.textContent = result.prediction === 1 ? "Readmitted" : "Not Readmitted";
        riskEl.textContent = result.risk;
        probabilityEl.textContent = result.probability;

        resultBox.classList.remove("hidden");
      } catch (error) {
        alert("Server error: " + error.message);
      }
    });
  </script>
</body>
</html>
